<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="KieZ Pharma – Uganda's trusted online medical supplies store. Shop surgical, diagnostic, wound care, pharmacy and more with fast delivery." />
    
    <!-- PWA / Theme -->
    <meta name="theme-color" content="#FF4F5A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="KieZ Pharma" />

    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KieZ Pharma" />
    <link rel="apple-touch-icon" sizes="192x192" href="https://upload.wikimedia.org/wikipedia/commons/thumb/9/91/Red_cross.svg/192px-Red_cross.svg.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="https://upload.wikimedia.org/wikipedia/commons/thumb/9/91/Red_cross.svg/512px-Red_cross.svg.png" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileColor" content="#FF4F5A" />
    <meta name="msapplication-tap-highlight" content="no" />

    <title>KieZ Pharma – Medical Supplies Uganda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(
            (registration) => { console.log('SW registered: ', registration.scope); },
            (err) => { console.log('SW registration failed: ', err); }
          );
        });
      }
    </script>
  </body>
</html>
